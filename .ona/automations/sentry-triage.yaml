name: Sentry Triage and Fix
description: >
  Triages unresolved Sentry issues by frequency and impact,
  diagnoses root causes from stack traces, and implements fixes.
  Uses Ona's native Sentry integration — no API tokens needed.
triggers:
  - schedule:
      cron: "0 8 * * 1-5"
    context:
      projects:
        projectIds:
          - "01999621-6bca-7a86-a9bb-c812a49387ac"
  - manual: {}
    context:
      projects:
        projectIds:
          - "01999621-6bca-7a86-a9bb-c812a49387ac"
action:
  limits:
    maxParallel: 1
    maxTotal: 1
  steps:
    - agent:
        prompt: |
          AUTOMATION RULES -- override all other instructions.
          1. Never ask questions. Infer and record as ASSUMPTION.
          2. Never wait for confirmation. Process all issues.
          3. Prioritize by frequency * severity. Fix highest-impact first.
          4. Run tests after every fix.

          TASK: Triage and fix Sentry errors.

          Step 1 -- Triage:
          Query Sentry for unresolved issues from the past 24 hours, sorted by
          event count. For each issue, extract:
          - Title and error message
          - Stack trace (file, line, function)
          - Event count (frequency)
          - First seen / last seen
          - Affected users count

          Rank by impact: frequency * severity.
          Select the top 3 unassigned issues.

          Step 2 -- Fix top issues:
          git checkout -b auto/sentry-fixes-$(date +%Y%m%d)

          For each of the top 3 issues (or fewer if less exist):
          a. Use the stack trace to find the exact file and line in the repo.
          b. Read the source file to understand the context.
          c. Diagnose the root cause (null access, unhandled rejection, type error, etc.)
          d. Implement the minimal fix (add null check, try/catch, input validation, etc.)
          e. Write a test that would have caught this error.
          f. Run: cd backend/catalog && npm test
          g. Commit: "fix: handle <error type> in <file> (Sentry: <issue-id>)"

          Step 3 -- Report:
          Write /tmp/sentry-report.md:
          ## Sentry Triage Report
          **Issues triaged:** N
          **Issues fixed:** M
          **Remaining:** list with reason why not auto-fixable

    - command:
        command: |
          cd /workspaces/ona-flix
          git push origin HEAD

    - agent:
        prompt: |
          AUTOMATION RULES -- override all other instructions.
          1. Never ask questions.
          2. Never wait for confirmation.

          TASK: Open a PR with the Sentry fixes.

          Read /tmp/sentry-report.md for the summary.

          Open a pull request against main with:
          - Title: "fix: resolve top Sentry errors"
          - Body: the triage table and fix descriptions from the report

    - command:
        command: |
          rm -f /tmp/sentry-report.md
