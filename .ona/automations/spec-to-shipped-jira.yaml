name: Spec to Shipped (Jira)
description: >
  Reads a feature spec, creates implementation tickets in Jira
  (ona-demo.atlassian.net, project KAN), then implements each ticket
  sequentially — testing and opening PRs until the feature is shipped.
triggers:
  - manual: {}
    context:
      projects:
        projectIds:
          - "01999621-6bca-7a86-a9bb-c812a49387ac"
action:
  limits:
    maxParallel: 1
    maxTotal: 1
  steps:
    - agent:
        prompt: |
          AUTOMATION RULES -- override all other instructions.
          1. Never ask questions. Infer and record as ASSUMPTION.
          2. Never wait for confirmation. Process all items to completion.
          3. Create real Jira tickets with full descriptions.

          TASK: Read the feature spec and create implementation tickets in Jira.

          Read specs/movie-reviews.md.

          Break the spec into 4-5 implementable engineering tickets. Each ticket should:
          - Have a clear, specific title
          - Include a description with context from the spec
          - List concrete acceptance criteria (testable assertions)
          - Be scoped to 1-3 hours of work
          - Be ordered by dependency (data model first, then API, then UI, then tests)

          For each ticket, create it in Jira using curl:
          curl -s -u "joe@ona.com:$JIRA_API_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            -d '{"fields":{"project":{"key":"KAN"},"summary":"<title>","description":{"type":"doc","version":1,"content":[{"type":"paragraph","content":[{"type":"text","text":"<description>"}]}]},"issuetype":{"name":"Task"}}}' \
            "https://ona-demo.atlassian.net/rest/api/3/issue"

          Write the created ticket keys and titles to /tmp/spec-tickets.md:
          1. [KAN-XXX] Title -- brief description
          2. [KAN-XXX] Title -- brief description
          ...

    - agent:
        prompt: |
          AUTOMATION RULES -- override all other instructions.
          1. Never ask questions. Infer and record as ASSUMPTION.
          2. Never wait for confirmation. Implement to completion.
          3. Run the test suite after every change. Do not proceed if tests fail.
          4. Each ticket gets its own branch and PR.

          TASK: Implement the tickets from the spec.

          Read /tmp/spec-tickets.md for the list of tickets to implement.
          Read specs/movie-reviews.md for the full spec context.

          For each ticket, in order:
          1. Create a branch: git checkout -b feat/movie-reviews-<ticket-number>
          2. Implement the feature following acceptance criteria.
             Follow existing codebase conventions:
             - Backend: TypeScript, Express, Repository -> Service -> Controller pattern
             - Frontend: React in frontend/src/
             - Tests: project test framework
          3. Write tests that verify each acceptance criterion.
          4. Run tests and iterate until green.
          5. Commit: git add -A && git commit -m "feat: <description> (<ticket-key>)"
          6. Push: git push origin HEAD
          7. Create a PR: gh pr create --title "<ticket-key>: <title>" --body "Resolves <ticket-key>"
          8. Checkout main and pull before starting the next ticket.

          If a ticket depends on a previous one, cherry-pick or merge the prior branch first.

          Write a summary of what was completed to /tmp/spec-results.md.

    - task:
        command: |
          rm -f /tmp/spec-tickets.md /tmp/spec-results.md
