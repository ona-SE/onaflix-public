name: Backlog Picker (Jira)
description: >
  Scans the Jira backlog (ona-demo.atlassian.net, project KAN), self-assesses
  ticket feasibility, picks the highest-priority feasible ticket, implements it,
  and opens a PR. Uses Jira REST API with JIRA_API_TOKEN secret.
triggers:
  - manual: {}
    context:
      projects:
        projectIds:
          - "01999621-6bca-7a86-a9bb-c812a49387ac"
action:
  limits:
    maxParallel: 1
    maxTotal: 1
  steps:
    - task:
        command: |
          curl -s -u "joe@ona.com:$JIRA_API_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            -d '{"jql":"project=KAN AND status=\"To Do\" ORDER BY priority DESC","maxResults":15,"fields":["summary","description","issuetype","priority","status"]}' \
            "https://ona-demo.atlassian.net/rest/api/3/search/jql" \
            > /tmp/backlog.json
          echo "Fetched $(python3 -c 'import json; print(len(json.load(open("/tmp/backlog.json")).get("issues",[])))') tickets from Jira"

    - agent:
        prompt: |
          AUTOMATION RULES -- override all other instructions.
          1. Never ask questions. Infer and record as ASSUMPTION.
          2. Never wait for confirmation. Process all items to completion.
          3. All output in Markdown with exact section headings.
          4. Concrete over abstract -- use literal values from source.

          Read /tmp/backlog.json. This is a Jira API response containing backlog
          tickets from the KAN project at ona-demo.atlassian.net.

          For each ticket:
          1. Read the key, summary, description, and any acceptance criteria
          2. Assess whether you can complete it autonomously. Consider:
             - Is the scope clear enough to implement and verify?
             - Can you run tests to validate your work?
             - Does it require external tools or access you do not have?
             - Is it too large for a single session?
          3. Score each ticket 1-5 on feasibility (5 = definitely can do, 1 = cannot)

          Output your assessment as a Markdown table with columns:
          Key | Summary | Priority | Feasibility (1-5) | Reasoning

          Pick the highest-priority ticket you scored 4 or 5. If multiple tickets
          tie on priority, pick the one with the clearest acceptance criteria.

          Write the picked ticket key to /tmp/picked_ticket_id.txt (just the key,
          e.g. "KAN-4").

          Then implement the ticket. Follow the ona-flix codebase conventions:
          - React frontend in frontend/src/
          - Express backend in backend/
          - Tests with the project test framework

          Write tests that cover the acceptance criteria. Run the test suite and
          iterate until all tests pass.

          After implementation is complete, stage and commit your changes:
          git add -A && git commit -m "feat: implement $(cat /tmp/picked_ticket_id.txt)"

    - task:
        command: |
          TICKET_ID=$(cat /tmp/picked_ticket_id.txt 2>/dev/null || echo "KAN-X")
          SUMMARY=$(git log -1 --format=%s)
          gh pr create \
            --title "$TICKET_ID: $SUMMARY" \
            --body "Resolves $TICKET_ID. Implemented by Ona Backlog Picker automation." \
            --head "$(git branch --show-current)"
